components:
  schemas:
    Holiday:
      type: object
      properties:
        DATE:
          type: string
          example: "20240101"
          description: The holiday date (YYYYMMDD format)
        TYPE:
          type: string
          example: "공휴일"
          description: Type of the holiday (e.g., 공휴일, 대체공휴일)
        DESC:
          type: string
          example: "신정"
          description: A brief description of the holiday
