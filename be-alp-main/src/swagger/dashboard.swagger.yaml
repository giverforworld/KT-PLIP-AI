components:
  schemas:
    Info:
      type: array
      items:
        type: object
        properties:
          sidoCode:
            type: number
            example: 11
          key:
            type: string
            example: "alp"
          value:
            type: number
            example: 2291115
          prevMonthComparison:
            type: number
            example: 2.17
          prevYearComparison:
            type: number
            example: 3.56
    DashboardChartData:
      type: array
      items:
        type: object
        properties:
          key:
            type: string
            example: "전국 시도별 생활인구"
          charts:
            type: array
            items:
              type: object
              properties:
                구분:
                  type: string
                  example: "경기도"
                데이터명:
                  type: number
                  example: 33306885.46
    Dashboards:
      type: array
      items:
        type: object
        properties:
          구분:
            type: string
            example: "지역명"
          인구데이터값:
            type: number
            example: 33306885.46
    Move:
      type: array
      items:
        type: object
        properties:
          구분:
            type: string
            example: "지역명"
          유입인구데이터값:
            type: number
            example: 6.46
          유출인구데이터값:
            type: number
            example: 6.38
    Common:
      type: object
      properties:
        indicate:
          type: array
          items:
            type: object
            properties:
              구분:
                type: string
                example: "지역명"
              데이터:
                type: number
                example: 6.46
    ReportData:
      type: object
      properties:
        regionName:
          type: string
          example: "지역명"
        summary:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
                example: "생활이동"
              data:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                      example: "유입/유출 인구"
                    data:
                      type: string
                      example: "{지역명} 으로 유입된 인구는 총 {1,398,235}명, 유출된 인구는 총 {1,398,235}명으로 나타났습니다."
        mop:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
                example: "생활 이동 흐름"
              summary:
                type: string
                example: "data summary"
              charts:
                type: array
                items:
                  type: object
                  properties:
                    regionName:
                      type: string
                      example: "지역명"
                    name:
                      type: string
                      example: "chart name"
                    indicate:
                      type: array
                      items:
                        type: object
                        properties:
                          구분:
                            type: string
                            example: "8/1 0:00"
                          생활인구:
                            type: number
                            example: 56711
